<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink Ops Pro</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body{margin:0;font-family:Inter,system-ui;background:#0b1220;color:#e2e8f0}
        .wrap{max-width:800px;margin:0 auto;padding:18px}
        .card{background:#0f172a;border:1px solid #334155;border-radius:16px;overflow:hidden}
        .head{display:flex;justify-content:space-between;padding:16px;border-bottom:1px solid #334155}
        .main{padding:12px;display:grid;grid-template-columns:1fr;gap:12px}
        .panel{border:1px solid #334155;background:#111827;border-radius:12px;padding:12px}
        .hero{border-color:#4f46e5}
        .btn{border:0;border-radius:10px;padding:12px 14px;color:#fff;font-weight:700;cursor:pointer;background:#1d4ed8;font-size:1.1rem}
        .btn.primary{background:linear-gradient(130deg,#7c3aed,#4f46e5)}
        .btn:disabled{opacity:.6}
        .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
        .console{height:360px;overflow:auto;border:1px solid #334155;border-radius:10px;background:#020617;padding:10px;font-family:ui-monospace,monospace;margin-top:10px}
        #hwBadge{padding:6px 12px;background:#1e293b;border-radius:20px;font-size:0.9rem;font-weight:bold}
        .line-ok{color:#86efac}
        .line-warn{color:#fcd34d}
        .line-err{color:#fca5a5}
        .line-note{color:#c4b5fd}
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="head">
            <div>
                <h2 style="margin:0">Ink Ops Professional Console</h2>
                <div style="color:#94a3b8">Simplified operator view for ISO 15693 tag management.</div>
            </div>
            <div id="hwBadge">Checking reader...</div>
        </div>
        
        <div class="main">
            <section class="panel hero">
                <h3>🔥 Ink Clone Workflow</h3>
                <button id="burnBtn" class="btn primary" style="width:100%">Start Ink Clone Burn</button>
                
                <div class="row">
                    <button id="scanBtn" class="btn" style="flex: 1">Scan Tag UID</button>
                    <button id="reconnectBtn" class="btn" style="background:#475569">Reconnect Reader</button>
                </div>

                <div class="console" id="console">
                    <div class="line-note">[Idle] Ready for operator command.</div>
                </div>
            </section>
        </div>
    </div>
</div>
<script>
    const s=io(),$=id=>document.getElementById(id);
    const controls=['burnBtn','scanBtn','reconnectBtn'].map($);
    
    function busy(v){controls.forEach(b=>b&&(b.disabled=v));}
    
    function addLog(t){
        const d=document.createElement('div');
        const x=String(t||'');
        d.textContent=x;
        d.className=x.includes('✅')?'line-ok':x.includes('⚠️')?'line-warn':x.includes('❌')?'line-err':'line-note';
        $('console').appendChild(d);
        $('console').scrollTop=$('console').scrollHeight;
    }

    $('burnBtn').onclick=()=>{busy(true);addLog('🚀 Starting verbose ink clone workflow...');s.emit('start_burn');};
    $('scanBtn').onclick=()=>{busy(true);addLog('⏳ Initializing target tag scan...');s.emit('scan_tag');};
    $('reconnectBtn').onclick=()=>{busy(true);s.emit('reconnect_reader');};

    s.on('log_update',m=>addLog(m.data));
    s.on('action_complete',()=>busy(false));
    s.on('hw_status_update',m=>$('hwBadge').textContent=m.status==='Connected'?'PN532 Online':m.status);
    s.emit('refresh_hw_status');
</script>
</body>
</html>
