<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Ink Tag Utility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-1: #f1f5ff;
            --bg-2: #eef8ff;
            --card: #ffffff;
            --ink: #0f172a;
            --muted: #64748b;
            --brand: #2563eb;
            --brand-2: #4f46e5;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --console-bg: #0b1220;
            --console-border: #1e293b;
            --console-text: #a7f3d0;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: Inter, "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #dbeafe 0%, transparent 45%),
                        radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%),
                        linear-gradient(180deg, var(--bg-1), var(--bg-2));
        }

        .page-wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 3.25rem 1rem 2rem;
        }

        .app-card {
            background: var(--card);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .app-header {
            padding: 2rem 2rem 1.5rem;
            background: linear-gradient(120deg, rgba(37, 99, 235, 0.08), rgba(79, 70, 229, 0.08));
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .app-title {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 750;
            letter-spacing: -0.02em;
        }

        .app-subtitle {
            margin-top: 0.35rem;
            margin-bottom: 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .app-body {
            padding: 1.75rem 2rem 2rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .status-label {
            color: #334155;
            font-weight: 550;
            font-size: 0.95rem;
        }

        .status-badge {
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
            font-size: 0.88rem;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.35rem 0.7rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            display: inline-block;
        }

        .status-ok {
            color: #166534;
            background: #dcfce7;
        }

        .status-ok .status-dot {
            background: var(--success);
        }

        .status-error {
            color: #991b1b;
            background: #fee2e2;
            max-width: 380px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-error .status-dot {
            background: var(--danger);
        }

        .burn-btn {
            width: 100%;
            border: 0;
            border-radius: 14px;
            padding: 1rem 1.25rem;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        .burn-btn:hover:enabled {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.3);
        }

        .burn-btn:disabled {
            opacity: 0.92;
            cursor: not-allowed;
        }

        .burn-btn.warning {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.25);
        }

        .section-title {
            margin-top: 1.35rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            font-weight: 700;
        }

        .console-box {
            height: 300px;
            overflow-y: auto;
            border-radius: 14px;
            border: 1px solid var(--console-border);
            background: var(--console-bg);
            color: var(--console-text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.9rem;
            line-height: 1.45;
            padding: 0.9rem 1rem;
        }

        .console-box div { margin-bottom: 0.2rem; }

        .footer-note {
            color: #94a3b8;
            margin-top: 0.85rem;
            font-size: 0.8rem;
            text-align: right;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="app-card">
        <div class="app-header">
            <h1 class="app-title">Photobooth Ink System</h1>
            <p class="app-subtitle">Tag Customization Control Panel</p>
        </div>

        <div class="app-body">
            <div class="status-row">
                <span class="status-label">Hardware Status</span>
                {% if hw_status == "Connected" %}
                    <span class="status-badge status-ok"><span class="status-dot"></span>PN532 Reader Active</span>
                {% else %}
                    <span class="status-badge status-error" title="{{ hw_status }}"><span class="status-dot"></span>{{ hw_status }}</span>
                {% endif %}
            </div>

            <button id="burnBtn" class="burn-btn">🔥 Burn New Roll Tag</button>

            <h6 class="section-title">Real-Time Process Logs</h6>
            <div id="console" class="console-box">
                <div>[System Idle] Ready for next operation...</div>
            </div>
            <div class="footer-note">Live updates over Socket.IO</div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const burnBtn = document.getElementById('burnBtn');
    const consoleBox = document.getElementById('console');

    function resetButton() {
        burnBtn.disabled = false;
        burnBtn.classList.remove('warning');
        burnBtn.innerText = '🔥 Burn New Roll Tag';
    }

    burnBtn.addEventListener('click', () => {
        burnBtn.disabled = true;
        burnBtn.classList.add('warning');
        burnBtn.innerText = '⚡ Burning in Progress...';
        consoleBox.innerHTML = '';
        socket.emit('start_burn');
    });

    socket.on('log_update', (msg) => {
        const line = document.createElement('div');
        line.textContent = msg.data;
        consoleBox.appendChild(line);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    });

    socket.on('action_complete', (msg) => {
        if (msg.status === 'busy') {
            burnBtn.innerText = '⏳ Another Burn Running';
            setTimeout(resetButton, 1000);
            return;
        }
        resetButton();
    });
</script>
</body>
</html>
