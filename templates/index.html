<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1.0'/><title>Ink Ops Pro</title><script src='https://cdn.socket.io/4.7.5/socket.io.min.js'></script><style>body{margin:0;font-family:Inter,system-ui;background:#0b1220;color:#e2e8f0}.wrap{max-width:1180px;margin:0 auto;padding:18px}.card{background:#0f172a;border:1px solid #334155;border-radius:16px;overflow:hidden}.head{display:flex;justify-content:space-between;padding:16px;border-bottom:1px solid #334155}.main{padding:12px;display:grid;grid-template-columns:1.8fr 1fr;gap:12px}.panel{border:1px solid #334155;background:#111827;border-radius:12px;padding:12px}.hero{border-color:#4f46e5}.btn{border:0;border-radius:10px;padding:10px 12px;color:#fff;font-weight:700;cursor:pointer;background:#1d4ed8}.btn.primary{background:linear-gradient(130deg,#7c3aed,#4f46e5)}.btn:disabled{opacity:.6}.row{display:flex;gap:8px;flex-wrap:wrap}.console{height:360px;overflow:auto;border:1px solid #334155;border-radius:10px;background:#020617;padding:10px;font-family:ui-monospace,monospace;margin-top:10px}.tab{padding:7px 10px;border:1px solid #334155;border-radius:8px;background:#0b1220;color:#cbd5e1;cursor:pointer}.tab.active{background:#1e293b}.hidden{display:none}input{width:100%;padding:8px;background:#0b1220;color:#fff;border:1px solid #475569;border-radius:8px}.fields{display:grid;grid-template-columns:110px 1fr;gap:7px;align-items:center}.line-ok{color:#86efac}.line-warn{color:#fcd34d}.line-err{color:#fca5a5}.line-note{color:#c4b5fd}@media(max-width:950px){.main{grid-template-columns:1fr}}</style></head>
<body><div class='wrap'><div class='card'><div class='head'><div><h2 style='margin:0'>Ink Ops Professional Console</h2><div style='color:#94a3b8'>Ink cloning remains primary. Advanced PN532 tooling is available in tabs.</div></div><div id='hwBadge'>{% if hw_status == 'Connected' %}PN532 Online{% else %}{{ hw_status }}{% endif %}</div></div>
<div class='main'><section class='panel hero'><h3>🔥 Ink Clone Workflow (Primary)</h3><button id='burnBtn' class='btn primary' style='width:100%'>Start Ink Clone Burn</button><div class='console' id='console'><div class='line-note'>[Idle] Ready for operator command.</div></div></section>
<section class='panel'><h3>Advanced Tools</h3><div class='row'><button class='tab active' data-tab='quick'>Quick</button><button class='tab' data-tab='classic'>MIFARE</button><button class='tab' data-tab='ntag'>NTAG</button><button class='tab' data-tab='ops'>Ops</button></div>
<div id='tab-quick'><div class='row' style='margin-top:8px'><button id='scanBtn' class='btn'>Scan UID</button><button id='profileBtn' class='btn'>Profile Tag</button><button id='fwBtn' class='btn'>Firmware</button><button id='reconnectBtn' class='btn'>Reconnect</button></div></div>
<div id='tab-classic' class='hidden'><div class='fields' style='margin-top:8px'><label>Block</label><input id='block' type='number' min='0' max='63' value='4'><label>16-byte Hex</label><input id='hex' value='000102030405060708090A0B0C0D0E0F'></div><div class='row' style='margin-top:8px'><button id='readBtn' class='btn'>Read</button><button id='writeBtn' class='btn'>Write</button><button id='dumpBtn' class='btn'>Dump</button></div><div class='row' style='margin-top:8px'><label><input id='verifyClassic' type='checkbox' checked> Verify Write</label><label><input id='expertMode' type='checkbox'> Expert Trailer Writes</label></div></div>
<div id='tab-ntag' class='hidden'><div class='fields' style='margin-top:8px'><label>Page</label><input id='ntagPage' type='number' min='0' max='255' value='4'><label>4-byte Hex</label><input id='ntagHex' value='00010203'></div><div class='row' style='margin-top:8px'><button id='ntagReadBtn' class='btn'>Read Page</button><button id='ntagWriteBtn' class='btn'>Write Page</button></div></div>
<div id='tab-ops' class='hidden'><div class='fields' style='margin-top:8px'><label>Backup Name</label><input id='backupName' value='session-backup'></div><div class='row' style='margin-top:8px'><button id='backupBtn' class='btn'>Backup (Dump)</button><button id='restoreBtn' class='btn'>Restore Backup</button><button id='historyBtn' class='btn'>Export History</button></div></div>
</section></div></div></div>
<script>
const s=io(),$=id=>document.getElementById(id); const controls=['burnBtn','scanBtn','profileBtn','fwBtn','reconnectBtn','readBtn','writeBtn','dumpBtn','ntagReadBtn','ntagWriteBtn','backupBtn','restoreBtn','historyBtn'].map($); const tabs=[...document.querySelectorAll('.tab')];
function busy(v){controls.forEach(b=>b&&(b.disabled=v));}
function addLog(t){const d=document.createElement('div');const x=String(t||'');d.textContent=x;d.className=x.includes('✅')?'line-ok':x.includes('⚠️')?'line-warn':x.includes('❌')?'line-err':'line-note';$('console').appendChild(d);$('console').scrollTop=$('console').scrollHeight;}
function hex(v){return (v||'').replace(/[^0-9a-fA-F]/g,'').toUpperCase();}
tabs.forEach(t=>t.onclick=()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');['quick','classic','ntag','ops'].forEach(k=>$('tab-'+k).classList.toggle('hidden',t.dataset.tab!==k));});
$('burnBtn').onclick=()=>{busy(true);addLog('🚀 Starting verbose ink clone workflow...');s.emit('start_burn');};
$('scanBtn').onclick=()=>{busy(true);s.emit('scan_tag')}; $('profileBtn').onclick=()=>{busy(true);s.emit('profile_tag')}; $('fwBtn').onclick=()=>{busy(true);s.emit('get_firmware')}; $('reconnectBtn').onclick=()=>{busy(true);s.emit('reconnect_reader')};
$('readBtn').onclick=()=>{busy(true);s.emit('read_classic_block',{block:parseInt($('block').value||'4',10)})};
$('writeBtn').onclick=()=>{const block=parseInt($('block').value||'4',10);const data_hex=hex($('hex').value);$('hex').value=data_hex;if(data_hex.length!==32){addLog('❌ Need 32 hex chars');return;}busy(true);s.emit('write_classic_block',{block,data_hex,verify:$('verifyClassic').checked,expert:$('expertMode').checked});};
$('dumpBtn').onclick=()=>{busy(true);s.emit('dump_classic',{start_block:0,end_block:15,name:$('backupName').value||'latest'});};
$('backupBtn').onclick=()=>$('dumpBtn').onclick(); $('restoreBtn').onclick=()=>{busy(true);s.emit('restore_backup',{verify:true});}; $('historyBtn').onclick=()=>{busy(true);s.emit('export_history');};
$('ntagReadBtn').onclick=()=>{busy(true);s.emit('ntag_read_page',{page:parseInt($('ntagPage').value||'4',10)});};
$('ntagWriteBtn').onclick=()=>{const page=parseInt($('ntagPage').value||'4',10);const data_hex=hex($('ntagHex').value);$('ntagHex').value=data_hex;if(data_hex.length!==8){addLog('❌ Need 8 hex chars');return;}busy(true);s.emit('ntag_write_page',{page,data_hex,verify:true});};
s.on('log_update',m=>addLog(m.data)); s.on('action_complete',()=>busy(false)); s.on('hw_status_update',m=>$('hwBadge').textContent=m.status==='Connected'?'PN532 Online':m.status); s.emit('refresh_hw_status');
</script></body></html>
